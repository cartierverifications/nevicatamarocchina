<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATTENZIONE: NEVICATA MAROCCHINA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Space+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Space Mono', monospace;
            overflow: hidden;
            background-color: #030712; /* Blu notte molto scuro */
        }

        .oswald {
            font-family: 'Oswald', sans-serif;
        }

        /* Effetto Strobo di Emergenza Freddo (Blu e Ciano) */
        @keyframes strobe {
            0%, 49% { background-color: #030712; }
            50%, 100% { background-color: #1d4ed8; } /* Blu intenso */
        }

        .strobe-active {
            animation: strobe 0.3s infinite;
        }

        /* Animazione per i fiocchi di neve */
        @keyframes fall {
            0% {
                transform: translateY(-10vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.9;
            }
            90% {
                opacity: 0.9;
            }
            100% {
                transform: translateY(110vh) translateX(50px) rotate(360deg);
                opacity: 0;
            }
        }

        .snowflake {
            position: absolute;
            color: #ffffff;
            user-select: none;
            pointer-events: none;
            z-index: 10;
            will-change: transform;
        }

        /* Righe diagonali stile pericolo ma con colori freddi (Blu e Ciano) */
        .hazard-stripes {
            background: repeating-linear-gradient(
                45deg,
                #06b6d4,
                #06b6d4 20px,
                #0b132b 20px,
                #0b132b 40px
            );
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col justify-between relative select-none" id="main-body">

    <!-- Contenitore Neve -->
    <div id="snow-container" class="absolute inset-0 pointer-events-none overflow-hidden z-10"></div>

    <!-- Banner superiore di pericolo -->
    <div class="h-6 hazard-stripes w-full z-20 shadow-md"></div>

    <!-- Banner Fluttuante Attivazione Audio (Scomparirà al primo tocco) -->
    <div id="audio-prompt" class="absolute top-8 left-1/2 -translate-x-1/2 z-30 w-[90%] max-w-md bg-cyan-950/90 border-2 border-cyan-400 text-cyan-200 text-center py-3 px-4 rounded-xl shadow-[0_0_20px_rgba(6,182,212,0.5)] animate-pulse cursor-pointer flex items-center justify-center gap-3">
        <span class="text-xl">🔊</span>
        <span class="text-xs md:text-sm font-bold tracking-wider uppercase">Tocca lo schermo per attivare l'allarme acustico!</span>
    </div>

    <!-- Contenuto Principale (Subito visibile) -->
    <main class="flex-1 flex flex-col items-center justify-center text-center p-4 z-20 select-none">
        <div class="max-w-4xl mx-auto space-y-6">
            
            <!-- Badge Lampeggiante Ghiaccio -->
            <div class="inline-flex items-center gap-2 bg-cyan-500 text-slate-950 font-extrabold px-5 py-2 rounded-full text-xs md:text-sm tracking-widest uppercase shadow-[0_0_15px_rgba(6,182,212,0.6)] animate-bounce">
                <span class="w-3 h-3 rounded-full bg-white animate-ping"></span>
                ALLERTA GELIDA ATTIVA
            </div>

            <!-- Titolo ad altissimo impatto visivo -->
            <h1 class="oswald text-6xl md:text-9xl font-black text-white tracking-tight leading-none drop-shadow-[0_4px_20px_rgba(6,182,212,0.8)]">
                ATTENZIONE!
            </h1>

            <div class="border-y-4 border-dashed border-cyan-400 py-6 md:py-8 my-4 bg-slate-950/50 backdrop-blur-sm">
                <p class="oswald text-4xl md:text-7xl font-extrabold text-cyan-300 uppercase tracking-wide leading-none drop-shadow-[0_4px_10px_rgba(0,0,0,0.9)]">
                    NEVICATA DI BAMBA <br>
                    <span class="text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.6)]">IN ARRIVO!</span>
                </p>
            </div>

            <p class="text-cyan-100 text-sm md:text-lg max-w-xl mx-auto font-medium bg-slate-950/80 backdrop-blur-md p-4 rounded-xl border border-cyan-900/50 shadow-inner">
                Si prega di mettersi al riparo immediatamente e preparare l'attrezzatura termica di salvataggio.
            </p>

            <!-- Pulsante per silenziare o riattivare l'audio -->
            <button id="mute-btn" class="mx-auto mt-6 flex items-center gap-2 px-5 py-2.5 bg-slate-900/90 border border-cyan-800 text-cyan-300 hover:text-white rounded-full text-xs uppercase tracking-wider transition hover:bg-slate-800 active:scale-95 shadow-md">
                <svg id="mute-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path>
                </svg>
                <span id="mute-text">Attiva Allarme</span>
            </button>

        </div>
    </main>

    <!-- Barra inferiore di pericolo -->
    <div class="h-6 hazard-stripes w-full z-20 shadow-md"></div>

    <script>
        // Configurazione Audio (Sintetizzatore Sirena)
        let audioCtx = null;
        let mainOsc = null;
        let lfo = null;
        let mainGain = null;
        let isSirenPlaying = false;
        let interactionTriggered = false;

        // Inizializza e avvia la sirena sintetica d'emergenza glaciale
        function startEmergencySiren() {
            if (isSirenPlaying) return;

            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                // Oscillatore principale
                mainOsc = audioCtx.createOscillator();
                mainOsc.type = 'sawtooth'; 
                mainOsc.frequency.setValueAtTime(400, audioCtx.currentTime); // Pitch di partenza leggermente più cupo e freddo

                // LFO per l'oscillazione ondulatoria tipica delle sirene di emergenza civile
                lfo = audioCtx.createOscillator();
                lfo.frequency.setValueAtTime(1.0, audioCtx.currentTime); // 1 ciclo completo al secondo

                const lfoGain = audioCtx.createGain();
                lfoGain.gain.setValueAtTime(150, audioCtx.currentTime); // Oscilla di +/- 150Hz

                mainGain = audioCtx.createGain();
                mainGain.gain.setValueAtTime(0.0, audioCtx.currentTime); 
                
                lfo.connect(lfoGain);
                lfoGain.connect(mainOsc.frequency);
                
                mainOsc.connect(mainGain);
                mainGain.connect(audioCtx.destination);

                lfo.start();
                mainOsc.start();
                
                // Dissolvenza d'ingresso rapida per non danneggiare le casse
                mainGain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.1);
                
                isSirenPlaying = true;
                updateMuteUI(true);
            } catch (error) {
                console.error("Impossibile avviare il sintetizzatore audio:", error);
            }
        }

        // Funzione per spegnere o riaccendere la sirena
        function toggleSiren() {
            if (!audioCtx) {
                startEmergencySiren();
                return;
            }

            if (isSirenPlaying) {
                mainGain.gain.linearRampToValueAtTime(0.0, audioCtx.currentTime + 0.1);
                isSirenPlaying = false;
                updateMuteUI(false);
                document.body.classList.remove('strobe-active');
            } else {
                mainGain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.1);
                isSirenPlaying = true;
                updateMuteUI(true);
                document.body.classList.add('strobe-active');
            }
        }

        function updateMuteUI(active) {
            const btnText = document.getElementById('mute-text');
            const btnIcon = document.getElementById('mute-icon');
            if (active) {
                btnText.textContent = "Spegni Allarme";
                btnIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path>`;
            } else {
                btnText.textContent = "Attiva Allarme";
                btnIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path>`;
            }
        }

        // Generatore di Fiocchi di Neve Cadenti
        const snowContainer = document.getElementById('snow-container');
        const snowSymbols = ['❄', '❅', '❆', '•', '*'];

        function createSnowflake() {
            const flake = document.createElement('div');
            flake.classList.add('snowflake');
            
            const size = Math.random() * 18 + 6; // Dimensione da 6px a 24px
            const left = Math.random() * 100; // Posizione orizzontale di partenza (%)
            const duration = Math.random() * 5 + 3; // Durata caduta (3s - 8s)
            const delay = Math.random() * 2; 
            
            flake.innerText = snowSymbols[Math.floor(Math.random() * snowSymbols.length)];
            flake.style.fontSize = `${size}px`;
            flake.style.left = `${left}vw`;
            flake.style.animation = `fall ${duration}s linear ${delay}s infinite`;
            
            // Colore dei fiocchi: principalmente bianchi o leggermente azzurrati/sabbia
            if (Math.random() > 0.85) {
                flake.style.color = '#a5f3fc'; // Ciano chiarissimo (effetto ghiaccio)
                flake.style.filter = 'drop-shadow(0 0 6px rgba(6, 182, 212, 0.7))';
            } else {
                flake.style.color = '#ffffff';
                flake.style.filter = 'drop-shadow(0 0 4px rgba(255, 255, 255, 0.6))';
            }

            snowContainer.appendChild(flake);

            setTimeout(() => {
                flake.remove();
            }, (duration + delay) * 1000);
        }

        // Genera fiocchi in continuazione
        setInterval(createSnowflake, 120);

        // Gestore per l'interazione globale (Tocca un punto qualsiasi per avviare)
        function triggerGlobalInteraction() {
            if (interactionTriggered) return;
            interactionTriggered = true;

            // Rimuove la notifica in alto
            const prompt = document.getElementById('audio-prompt');
            if (prompt) {
                prompt.style.transition = 'all 0.5s ease';
                prompt.style.opacity = '0';
                setTimeout(() => prompt.remove(), 500);
            }

            // Attiva lo strobo visivo blu di emergenza
            document.body.classList.add('strobe-active');

            // Avvia l'audio della sirena
            startEmergencySiren();
        }

        // Registra il tocco globale ovunque per attivare istantaneamente
        window.addEventListener('click', triggerGlobalInteraction);
        window.addEventListener('touchstart', triggerGlobalInteraction);

        // Pulsante Mute per fermare/riattivare manualmente l'allarme
        const muteBtn = document.getElementById('mute-btn');
        muteBtn.addEventListener('click', (e) => {
            // Impedisce al click sul pulsante di ri-attivare l'evento di interazione globale
            e.stopPropagation(); 
            if (!interactionTriggered) {
                triggerGlobalInteraction();
            } else {
                toggleSiren();
            }
        });
    </script>
</body>
</html>
